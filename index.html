<section class="floating-form-container">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-11">
                <div class="card shadow-lg p-4 border-0 rounded-5">
                    <form class="row g-3 align-items-center">
                        
                        <div class="col-md-2 border-end">
                            <label class="form-label fw-bold small mb-1">Name</label>
                            <div class="input-group">
                                <span class="input-group-text bg-transparent border-0 ps-0"><i class="bi bi-person text-muted"></i></span>

                        </div>

                        <div class="col-md-3 border-end">
                            <label class="form-label fw-bold small mb-1">Phone Number</label>

                        </div>

                        <div class="col-md-2 border-end">
                            <label class="form-label fw-bold small mb-1">Preferred Date</label>

                        </div>

                        </div>

                            <button type="submit" class="btn btn-optic w-100 py-3 rounded-pill">Book an Appointment</button>
