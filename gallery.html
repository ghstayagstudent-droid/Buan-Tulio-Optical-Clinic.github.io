<style>
  @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap');

  body {
    background: linear-gradient(135deg, #f8f9fa, #eef3f9);
    padding: 40px 0;
    font-family: 'Poppins', sans-serif;
    text-align: center;
  }

  h1 {
    font-weight: 600;
    color: #212529;
    margin-bottom: 5px;
    letter-spacing: 1px;
  }

  .subtitle {
    color: #6c757d;
    margin-bottom: 30px;
  }

  .carousel-container {
    perspective: 1200px;
    width: 320px;
    height: 380px;
    margin: 0 auto 30px auto;
    position: relative;
  }

  .carousel {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.8s ease;
  }

  .card-3d {
    width: 260px;
    height: 320px;
    background: rgba(255, 255, 255, 0.7);
    backdrop-filter: blur(10px);
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
    position: absolute;
    top: 50%;
    left: 50%;
    transform-origin: center;
    margin: -160px -130px;
    overflow: hidden;
    transition: transform 0.3s ease, box-shadow 0.3s ease;
  }

  .card-3d:hover {
    transform: scale(1.05);
    box-shadow: 0 15px 40px rgba(0, 0, 0, 0.15);
  }

  .card-3d img {
    width: 100%;
    height: 70%;
    object-fit: cover;
  }

  .card-body {
    padding: 15px;
  }

  .card-3d h5 {
    font-weight: 600;
    color: #0d6efd;
    margin-bottom: 5px;
  }

  .card-3d p {
    font-weight: 500;
    color: #495057;
  }

  .btn-group {
    margin-top: 15px;
  }

  .btn-primary {
    border-radius: 50px;
    padding: 8px 20px;
    background: #0d6efd;
    border: none;
    transition: 0.3s;
  }

  .btn-primary:hover {
    background: #0b5ed7;
    transform: translateY(-2px);
  }
</style>
</head>

<body>


<h1>Our Eyewear Collection</h1>

<div class="carousel-container">
  <div class="carousel" id="carousel">

    <!-- Card 1 -->

    </div>

    <!-- Card 3 -->
    <div class="card-3d">
      <img src="images/g3.jfif" alt="Frame 3" />
      <div class="card-body">
        <h5>Frame 3</h5>
        <p>₱5,500</p>
      </div>
    </div>

        <!-- Card 3 -->
    <div class="card-3d">
      <img src="images/g4.jfif" alt="Frame 4" />
      <div class="card-body">
        <h5>Frame 4</h5>
        <p>₱5,500</p>
      </div>
    </div>

        <!-- Card 3 -->
    <div class="card-3d">
      <img src="images/g5.jfif" alt="Frame 5" />
      <div class="card-body">

      </div>
    </div>




  </div>
</div>

<div class="btn-group">
  <button type="button" class="btn btn-primary" id="prevBtn">Prev</button>
  <button type="button" class="btn btn-primary" id="nextBtn">Next</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
  const carousel = document.getElementById("carousel");
  const cards = document.querySelectorAll(".card-3d");
  const total = cards.length;
  const angle = 360 / total;
  let rotation = 0;

  
  cards.forEach((card, i) => {
    card.style.transform = `rotateY(${i * angle}deg) translateZ(350px)`;
  });

 
  document.getElementById("nextBtn").addEventListener("click", () => {
    rotation -= angle;
    carousel.style.transform = `rotateY(${rotation}deg)`;
  });

  document.getElementById("prevBtn").addEventListener("click", () => {
    rotation += angle;
    carousel.style.transform = `rotateY(${rotation}deg)`;
  });
</script>

</body>
